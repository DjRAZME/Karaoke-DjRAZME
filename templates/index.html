<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DjRAZME - Замовлення треків</title>
    <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&display=swap" rel="stylesheet">
    <style>
        body { 
            /* Глубокий синий фон (как вечернее небо) */
            background: linear-gradient(180deg, #0057B7 0%, #002d5e 100%); 
            color: #fff; 
            font-family: 'Kelly Slab', serif; 
            text-align: center; 
            margin: 0;
            padding: 30px 20px; 
            min-height: 100vh;
        }
        h1 { 
            color: #FFD700; /* Золотой заголовок */
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }
        p { 
            font-size: 18px; 
            opacity: 0.9;
            margin-bottom: 30px;
        }
        #list {
            max-width: 500px;
            margin: 0 auto;
        }
        .song-btn { 
            /* Желтые кнопки */
            background: #FFD700; 
            border: none;
            border-radius: 15px;
            color: #002d5e; /* Темно-синий текст на кнопках для контраста */
            padding: 20px; 
            width: 100%; 
            margin: 12px 0; 
            font-size: 20px; 
            font-weight: bold;
            font-family: 'Kelly Slab', serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }
        .song-btn:active { 
            transform: scale(0.96);
            background: #e6c200;
        }
        /* Декор в украинском стиле по углам */
        .decor {
            position: fixed;
            font-size: 40px;
            opacity: 0.2;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="decor" style="top: 10px; left: 10px;">✽</div>
    <div class="decor" style="bottom: 10px; right: 10px;">✽</div>

    <h1>🎤 DjRAZME</h1>
    <p>Обери трек, і він прилетить мені на пульт!</p>

    <div id="list">
        {% for song in songs %}
        <button class="song-btn" onclick="send('{{ song }}')">{{ song }}</button>
        {% endfor %}
    </div>

    <script>
        function send(name) {
            fetch('/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({song: name})
            })
            .then(response => {
                if(response.ok) alert('Дякую! Замовлення на "' + name + '" прийнято!');
                else alert('Помилка при відправці.');
            });
        }
    </script>
</body>
</html>
