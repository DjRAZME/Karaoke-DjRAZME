<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DjRAZME - Замовлення треків</title>
    <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg, #0057B7 0%, #002d5e 100%); color: #fff; font-family: 'Kelly Slab', serif; text-align: center; margin: 0; padding: 30px 20px; min-height: 100vh; }
        h1 { color: #FFD700; font-size: 34px; text-transform: uppercase; letter-spacing: 2px; }
        .table-info { color: #FFD700; font-size: 20px; margin-bottom: 25px; border: 1px solid #FFD700; display: inline-block; padding: 5px 15px; border-radius: 10px; }
        .song-btn { background: #FFD700; border: none; border-radius: 15px; color: #002d5e; padding: 20px; width: 100%; margin: 10px 0; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <h1>🎤 DjRAZME</h1>
    <div class="table-info">ВАШ СТІЛ: №{{ table }}</div>
    <div id="list">
        {% for song in songs %}
        <button class="song-btn" onclick="send('{{ song }}')">{{ song }}</button>
        {% endfor %}
    </div>
    <script>
        const table = "{{ table }}"; 
        function send(name) {
            fetch('/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({song: name, table: table}) // Отправляем и песню, и стол
            })
            .then(res => {
                if(res.ok) alert('Дякую! Замовлення на "' + name + '" прийнято!');
                else alert('Замовлення зараз не приймаються.');
            });
        }
    </script>
</body>
</html>
