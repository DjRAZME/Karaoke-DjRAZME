<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DjRAZME - Замовлення треків</title>
    <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(180deg, #0057B7 0%, #002d5e 100%); 
            color: #fff; 
            font-family: 'Kelly Slab', serif; 
            text-align: center; 
            margin: 0;
            padding: 30px 20px; 
            min-height: 100vh;
        }
        h1 { color: #FFD700; font-size: 36px; text-transform: uppercase; letter-spacing: 3px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .song-btn { 
            background: #FFD700; 
            border: none;
            border-radius: 15px;
            color: #002d5e; 
            padding: 20px; 
            width: 100%; 
            margin: 12px 0; 
            font-size: 20px; 
            font-weight: bold;
            font-family: 'Kelly Slab', serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>🎤 DjRAZME</h1>
    <p>Обери трек, і він прилетить мені на пульт!</p>
    <div id="list">
        {% for song in songs %}
        <button class="song-btn" onclick="send('{{ song }}')">{{ song }}</button>
        {% endfor %}
    </div>
    <script>
        function send(name) {
            fetch('/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({song: name})
            })
            .then(response => {
                if(response.ok) alert('Дякую! Замовлення на "' + name + '" прийнято!');
                else alert('Замовлення зараз не приймаються.');
            });
        }
    </script>
</body>
</html>
