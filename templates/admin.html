<!DOCTYPE html>
<html>
<head>
    <title>DjRAZME ADMIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        .btn-toggle { padding: 20px; width: 100%; max-width: 400px; font-size: 20px; border-radius: 15px; cursor: pointer; border: none; margin-bottom: 30px; font-weight: bold; }
        .on { background: #28a745; color: white; box-shadow: 0 0 20px rgba(40, 167, 69, 0.5); }
        .off { background: #dc3545; color: white; box-shadow: 0 0 20px rgba(220, 53, 69, 0.5); }
        .order-item { background: #333; padding: 15px; margin: 10px auto; border-radius: 10px; border-left: 5px solid #FFD700; text-align: left; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Панель DjRAZME</h1>
    <button id="toggleBtn" class="btn-toggle {% if enabled %}on{% else %}off{% endif %}" onclick="toggleOrders()">
        {% if enabled %}ЗАМОВЛЕННЯ: ПРАЦЮЮТЬ{% else %}ЗАМОВЛЕННЯ: ВИМКНЕНО{% endif %}
    </button>
    <div id="orders-list">
        <h3>Нові замовлення:</h3>
        {% for order in orders %}
        <div class="order-item">{{ order }}</div>
        {% endfor %}
    </div>
    <script>
        function toggleOrders() {
            fetch('/toggle_orders', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                const btn = document.getElementById('toggleBtn');
                if (data.enabled) {
                    btn.innerText = "ЗАМОВЛЕННЯ: ПРАЦЮЮТЬ";
                    btn.className = "btn-toggle on";
                } else {
                    btn.innerText = "ЗАМОВЛЕННЯ: ВИМКНЕНО";
                    btn.className = "btn-toggle off";
                }
            });
        }
        setTimeout(() => { location.reload(); }, 10000);
    </script>
</body>
</html>
